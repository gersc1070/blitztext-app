name: Build Blitztext App

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    name: Build Blitztext macOS app
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build (Release)
        run: ./build.sh --release

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent Blitztext.app Blitztext.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blitztext-macOS
          path: Blitztext.zip
          if-no-files-found: error